{% extends 'base.html' %}
{% block title %}Register - SB Lotus Tailoring{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2>Create Account</h2>
        <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="form-group">
                <label for="username">Username *</label>
                <input type="text" id="username" name="username" class="form-control" required placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" class="form-control" required placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="text" id="phone" name="phone" class="form-control" placeholder="Your phone number">
            </div>
            <div class="form-group">
                <label for="address">Address</label>
                <textarea id="address" name="address" class="form-control" rows="2" placeholder="Your delivery address"></textarea>
            </div>
            <div class="form-group">
                <label for="password">Password * (min 6 characters)</label>
                <input type="password" id="password" name="password" class="form-control" required minlength="6" placeholder="Create a password">
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password *</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" required placeholder="Confirm your password">
            </div>
            <button type="submit" class="btn btn-primary">Register</button>
        </form>
        <div class="auth-footer">
            Already have an account? <a href="{{ url_for('auth.login') }}">Login here</a>
        </div>
    </div>
</div>
{% endblock %}
