{% extends 'base.html' %}
{% block title %}Login - SB Lotus Tailoring{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2>Welcome Back</h2>
        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" required placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
        </form>
        <div class="auth-footer">
            Don't have an account? <a href="{{ url_for('auth.register') }}">Register here</a>
        </div>
    </div>
</div>
{% endblock %}
