databases:
  - name: sb-lotus-db
    plan: free
    databaseName: sb_lotus_tailoring

services:
  - type: web
    name: sb-lotus-tailoring
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sb-lotus-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.12.0"
